<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>{% block title %}{% endblock %}</title>

        <link rel="stylesheet" href="{{ url_for('static', filename='styles/header.css') }}">
        <link rel="stylesheet" href="{{ url_for('static', filename='styles/auth.css') }}">
        <link rel="stylesheet" href="{{ url_for('static', filename='styles/index.css') }}">
        <link rel="stylesheet" href="{{ url_for('static', filename='styles/search.css') }}">

        <link rel="icon" href="{{ url_for('static', filename='images/logo/logo.png') }}">
    </head>

    <body>

    <header class="topbar">

        <a class="menu-btn NavIcons" onclick="toggleMenu()">☰</a>

        <div id="sidebar" class="sidebar">

            <div id="sidebar-page">

            </div>

            <div id="sidebar-blank" onclick="toggleMenu()">
                <div id="x">×</div>
            </div>

        </div>

        <a href="/">
            <div id="logo"></div>
        </a>

        <nav class="nav-links">

            <form action="/search" method="GET" class="search-form">
                <input type="text" name="q" placeholder="Search Products..." class="search-input">
            </form>

            <div>

                <a href="/account">
                    <img src="{{ url_for('static', filename='images/icons/account.svg') }}" class="NavIcons" alt="account">
                </a>

                <a href="/cart">
                    <img src="{{ url_for('static', filename='images/icons/cart.svg') }}" class="NavIcons" alt="cart">
                </a>

                {% if session.get("user_id") %}
                    <a href="/logout">
                        <img src="{{ url_for('static', filename='images/icons/logout.svg') }}" class="NavIcons" alt="logout">
                    </a>
                {% else %}
                    <a href="/login" id="NavLogin">
                        <img src="{{ url_for('static', filename='images/icons/login.svg') }}" class="NavIcons" alt="login">
                    </a>
                {% endif %}

            </div>

        </nav>

    </header>

    <main>
        {% block content %}
        {% endblock %}
    </main>

    <script src="{{ url_for('static', filename='scripts/script.js') }}"></script>

    </body>
</html>
