<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>{% block title %}{% endblock %}</title>
        <link rel="stylesheet" href="{{ url_for('static', filename='styles/header.css') }}">
        <link rel="stylesheet" href="{{ url_for('static', filename='styles/auth.css') }}">
        <link rel="stylesheet" href="{{ url_for('static', filename='styles/index.css') }}">
        <link rel="stylesheet" href="{{ url_for('static', filename='styles/search.css') }}">
        <link rel="icon" href="../static/images/logo/logo.png">
    </head>
    <body>

    <header class="topbar">

        <!-- Menu Button -->
        <a class="menu-btn" onclick="toggleMenu()">☰</a>
<!--        <button class="menu-btn" onclick="toggleMenu()">☰</button>-->

        <div id="sidebar" class="sidebar">
            <div id="sidebar-page">
                <a href="/account"><img src="../static/images/icons/account.svg" alt="img"></a> <!-- Account -->
                <a href="/cart"><img src="../static/images/icons/cart.svg" alt="img"></a> <!-- Cart -->
                <a href="/login"><img src="../static/images/icons/" alt="img"></a> <!-- Logout -->
            </div>
            <div id="sidebar-blank" onclick="toggleMenu()">
                <div id="x">×</div>
            </div>
        </div>

        <a href="/"><div id="logo"></div></a>

        <nav class="nav-links">

            <form action="/search" method="GET" class="search-form">
                <input type="text" name="q" placeholder="Search Products..." class="search-input">
            </form>

            <a href="/account"><img src="{{ url_for('static', filename='images/icons/account.svg') }}" alt="img"></a> <!-- Account -->
            <a href="/cart"><img src="{{ url_for('static', filename='images/icons/cart.svg') }}" alt="img"></a> <!-- Cart -->


            {% if current_user %}
                <a href="/logout"><img src="{{ url_for('static', filename='images/icons/logout.svg') }}" alt="img"></a> <!-- Logout -->
            {% else %}
                <a href="/login">Login</a> <!-- Login -->
            {% endif %}
        </nav>
    </header>

    <main>
        {% block content %}
        {% endblock %}
    </main>
    <script src="{{ url_for('static', filename='scripts/script.js') }}"></script>
    </body>
</html>
