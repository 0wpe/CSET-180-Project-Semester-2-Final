<form method="POST">
    <input name="title" value="{{ product.title }}">
    <textarea name="description">{{ product.description }}</textarea>

    <input name="price" value="{{ product.price }}">
    <input name="warranty_period" value="{{ product.warranty_period }}">
    <input name="inventory" value="{{ product.inventory }}">

    <button type="submit">Save</button>
</form>

<h3>Variants</h3>

<table>
    <tr>
        <th>Color</th>
        <th>Size</th>
        <th>Stock</th>
    </tr>

    {% for v in variants %}
    <tr>
        <td>{{ v.color }}</td>
        <td>{{ v.size }}</td>
        <td>{{ v.stock }}</td>
    </tr>
    {% endfor %}
</table>

<hr>

<h4>Add Variant</h4>

<form method="POST" action="/vendor/product/{{ product.id }}/variants">
    <input type="text" name="color" placeholder="Color">
    <input type="text" name="size" placeholder="Size">
    <input type="number" name="stock" placeholder="Stock">
    <button type="submit">Add Variant</button>
</form>
