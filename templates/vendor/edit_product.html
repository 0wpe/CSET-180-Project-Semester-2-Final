<style>

/* Start Top Bar */
.top-bar {
    display: flex;
    justify-content: flex-end;
    align-items: center;
    margin-bottom: 10px;
}

.back-btn {
    text-decoration: none;
    font-size: 1.4rem;
    color: var(--secondary-color);
    padding: 6px 10px;
    border-radius: var(--border-radius);
}

.back-btn:hover {
    background: #f3f3f3;
}
/* End Top Bar */


/* Start Form Layout */
form {
    display: flex;
    flex-direction: column;
    gap: 10px;
    max-width: 600px;
}
/* End Form Layout */


/* Start Inputs */
input,
textarea {
    padding: 10px;
    border: 1px solid #ddd;
    border-radius: var(--border-radius);
    font-family: var(--font-main);
    font-size: 0.9rem;
    width: 100%;
    box-sizing: border-box;
}

textarea {
    min-height: 100px;
    resize: vertical;
}
/* End Inputs */


/* Start Button */
button {
    padding: 10px;
    border: none;
    border-radius: var(--border-radius);
    background: var(--secondary-color);
    color: var(--primary-color);
    cursor: pointer;
    font-size: 0.9rem;
}

button:hover {
    opacity: 0.9;
}
/* End Button */


/* Start Headings */
h3, h4 {
    margin-top: 20px;
    color: var(--primary-text-color);
}
/* End Headings */


/* Start Table */
table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 10px;
    font-family: var(--font-main);
}

th, td {
    text-align: left;
    padding: 10px;
    border-bottom: 1px solid #e5e5e5;
    font-size: 0.9rem;
}

th {
    background: #f7f7f7;
    font-weight: 600;
}
/* End Table */


/* Start Variant Row */
.variant-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
}
/* End Variant Row */


/* Start Delete Button */
.delete-btn {
    background: var(--accent-color);
    color: white;
    padding: 6px 10px;
    border-radius: var(--border-radius);
    font-size: 0.8rem;
    border: none;
    cursor: pointer;
}

.delete-btn:hover {
    opacity: 0.9;
}
/* End Delete Button */


/* Start Divider */
hr {
    margin: 20px 0;
    border: none;
    border-top: 1px solid #e5e5e5;
}
/* End Divider */


/* Start Desktop */
@media (min-width: 768px) {

    form {
        max-width: 700px;
    }

    table {
        max-width: 700px;
    }

}
/* End Desktop */

</style>

<!-- Top Right Return -->
<div class="top-bar">
    <a href="/vendor/shop" class="back-btn">←</a>
</div>

<form method="POST">

    <input name="title" value="{{ product.title }}" placeholder="Product Title">
    <textarea name="description" placeholder="Product Description">{{ product.description }}</textarea>

    <input name="price" value="{{ product.price }}" placeholder="Price">
    <input name="warranty_period" value="{{ product.warranty_period }}" placeholder="Warranty Period (months)">
    <input name="inventory" value="{{ product.inventory }}" placeholder="Total Inventory">

    <button type="submit">Save</button>

</form>

<h3>Variants</h3>

<table>

    <tr>
        <th>Color</th>
        <th>Size</th>
        <th>Stock</th>
        <th></th>
    </tr>

    {% for v in variants %}
    <tr>

        <td>{{ v.color }}</td>
        <td>{{ v.size }}</td>
        <td>{{ v.stock }}</td>

        <td>
            <form method="POST" action="/vendor/delete-variant" style="margin:0;">
                <input type="hidden" name="variant_id" value="{{ v.id }}">
                <input type="hidden" name="product_id" value="{{ product.id }}">
                <button type="submit" class="delete-btn">Delete</button>
            </form>
        </td>

    </tr>
    {% endfor %}

</table>

<hr>

<h4>Add Variant</h4>

<form method="POST" action="/vendor/product/{{ product.id }}/variants">

    <input type="text" name="color" placeholder="Color (e.g. Red, Blue, Black)">
    <input type="text" name="size" placeholder="Size (e.g. S, M, L, XL)">
    <input type="number" name="stock" placeholder="Stock Quantity">

    <button type="submit">Add Variant</button>

</form>
