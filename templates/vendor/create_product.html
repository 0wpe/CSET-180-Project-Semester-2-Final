<style>
.form-container {
    height: calc(100vh - var(--topbar-height));
    display: flex;
    justify-content: center;
    align-items: center;
    width: 100%;
    background: #f4f4f4;
}

.form {
    width: 100%;
    max-width: 500px;
    padding: 2rem;
    display: flex;
    flex-direction: column;
    gap: 1rem;

    background: white;
    border-radius: 10px;
    box-shadow: 0 0 10px rgba(0,0,0,0.1);
}

.form h2 {
    text-align: center;
    margin-bottom: 0.5rem;
}

.form input,
.form textarea {
    padding: 0.8rem;
    border: 1px solid #ccc;
    border-radius: 5px;
    background: white;
    color: black;
    width: 100%;
    box-sizing: border-box;
}

.form textarea {
    min-height: 120px;
    resize: vertical;
}

.form input[type="file"] {
    padding: 0.4rem;
}

.form label {
    font-size: 0.9rem;
    opacity: 0.8;
}

.form button {
    padding: 0.8rem;
    border: none;
    background: #111;
    color: white;
    cursor: pointer;
    border-radius: 5px;
}

.variant-box {
    display: flex;
    gap: 0.5rem;
}

.variant-box input {
    flex: 1;
}

/* Image preview grid */
#preview {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-top: 5px;
}

#preview img {
    width: 80px;
    height: 80px;
    object-fit: cover;
    border-radius: 5px;
    border: 1px solid #ddd;
}

@media (max-width: 768px) {
    .form {
        border-radius: 0;
        box-shadow: none;
        height: 100%;
        justify-content: center;
    }

    .form-container {
        background: white;
    }
}
</style>

<div class="form-container">

    <form class="form" method="POST" enctype="multipart/form-data">

        <h2>Create Product</h2>

        <label>Product Title</label>
        <input type="text" name="title" required>

        <label>Description</label>
        <textarea name="description" required></textarea>

        <label>Price ($)</label>
        <input type="number" step="0.01" name="price" required>

        <label>Inventory (Default Stock)</label>
        <input type="number" name="inventory" required>

        <label>Warranty Period</label>
        <input type="number" name="warranty_period">

        <!-- MULTIPLE IMAGES -->
        <label>Images</label>
        <input type="file" name="images" multiple accept="image/*" onchange="previewImages(event)">

        <div id="preview"></div>

        <hr>

        <label>Variant (Initial Version)</label>

        <div class="variant-box">
            <input type="text" name="color" placeholder="Color">
            <input type="text" name="size" placeholder="Size">
        </div>

        <button type="submit">Create Product</button>

    </form>

</div>

<script>
let selectedFiles = [];

const fileInput = document.querySelector('input[name="images"]');
const preview = document.getElementById("preview");

// when user selects files
fileInput.addEventListener("change", function (event) {
    const newFiles = Array.from(event.target.files);

    // merge old + new
    selectedFiles = selectedFiles.concat(newFiles);

    renderPreview();
    updateInputFiles();
});

function renderPreview() {
    preview.innerHTML = "";

    selectedFiles.forEach(file => {
        if (!file.type.startsWith("image/")) return;

        const img = document.createElement("img");
        const url = URL.createObjectURL(file);

        img.src = url;
        img.onload = () => URL.revokeObjectURL(url);

        preview.appendChild(img);
    });
}

// IMPORTANT: rebuild input.files manually
function updateInputFiles() {
    const dataTransfer = new DataTransfer();

    selectedFiles.forEach(file => {
        dataTransfer.items.add(file);
    });

    fileInput.files = dataTransfer.files;
}
</script>
