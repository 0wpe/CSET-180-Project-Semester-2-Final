<style>

/* Start Shop Container */
.shop-container {
    width: 100%;
    padding: 10px;
    box-sizing: border-box;
    font-family: var(--font-main);
}
/* End Shop Container */


/* Start Header */
.shop-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 15px;
}

.shop-header-left {
    display: flex;
    align-items: center;
    gap: 10px;
}

.shop-header h2 {
    margin: 0;
    font-size: 1.2rem;
    color: var(--primary-text-color);
}

.shop-header a {
    background: var(--secondary-color);
    color: var(--primary-color);
    padding: 10px 12px;
    border-radius: var(--border-radius);
    text-decoration: none;
    display: inline-flex;
    align-items: center;
    justify-content: center;
}
/* End Header */


/* Start Grid */
.products-grid {
    display: grid;
    grid-template-columns: 1fr;
    gap: 10px;
}
/* End Grid */


/* Start Product Card */
.product-card {
    display: flex;
    gap: 12px;
    align-items: center;

    background: var(--primary-color);
    border-bottom: 1px solid #e5e5e5;

    padding: 12px;
}
/* End Product Card */


/* Start Product Image */
.product-card img {
    width: 80px;
    height: 80px;
    object-fit: cover;
    border-radius: var(--border-radius);
    flex-shrink: 0;
    background: #f3f3f3;
}
/* End Product Image */


/* Start Product Info */
.product-info {
    flex: 1;
    min-width: 0;
    display: flex;
    flex-direction: column;
    gap: 4px;
}

.product-info h3 {
    margin: 0;
    font-size: 0.95rem;
    font-weight: 600;
    color: var(--primary-text-color);

    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
}
/* End Product Info */


/* Start Price */
.price {
    display: flex;
    gap: 8px;
    align-items: center;
}

.old-price {
    text-decoration: line-through;
    color: #888;
    font-size: 0.85rem;
}

.new-price {
    color: var(--accent-color);
    font-weight: 600;
    font-size: 0.95rem;
}
/* End Price */


/* Start Actions */
.actions {
    display: flex;
    gap: 8px;
    margin-top: 6px;
    flex-wrap: wrap;
    align-items: center;
}
/* End Actions */


/* Start Buttons */
.actions a,
.actions button {
    padding: 6px 10px;
    border-radius: var(--border-radius);
    border: none;
    text-decoration: none;
    cursor: pointer;
    font-size: 0.8rem;
}
/* End Buttons */


/* Start Action Colors */
.actions a {
    background: var(--secondary-color);
    color: var(--primary-color);
}
/* End Action Colors */


/* Start Delete Button (FORCED VISIBILITY FIX) */
.inline-form {
    display: inline-block !important;
    margin: 0;
    padding: 0;
}

.delete-btn {
    background: #ef4444 !important;
    color: #fff !important;
    padding: 6px 10px;
    border-radius: var(--border-radius);
    border: none;
    cursor: pointer;
    font-size: 0.8rem;
    opacity: 1 !important;
    visibility: visible !important;
    display: inline-block !important;
}
/* End Delete Button */


/* Start Hover */
.product-card:hover {
    background: #fafafa;
}
/* End Hover */


/* Start Desktop */
@media (min-width: 900px) {

    .shop-container {
        max-width: 1000px;
        margin: auto;
    }

    .product-card {
        border: 1px solid #e5e5e5;
        border-radius: var(--border-radius);
    }

    .product-card img {
        width: 100px;
        height: 100px;
    }

}
/* End Desktop */

</style>

<div class="shop-container">

    <div class="shop-header">

        <div class="shop-header-left">
            <a href="/account">←</a>
            <h2>Your Shop</h2>
        </div>

        <a href="/vendor/create-product">+ Create Product</a>

    </div>

    <div class="products-grid">

        {% for product in products %}
        <div class="product-card">

            <img src="{{ product.image_url if product.image_url else '/static/images/products/default.png' }}">

            <div class="product-info">

                <h3>{{ product.title }}</h3>

                <div class="price">

                    {% if product.new_price %}
                        <span class="old-price">${{ product.price }}</span>
                        <span class="new-price">${{ product.new_price }}</span>
                    {% else %}
                        <span class="new-price">${{ product.price }}</span>
                    {% endif %}

                </div>

                <div class="actions">

                    <a href="/vendor/edit-product/{{ product.id }}">Edit</a>

                    <form action="/vendor/delete-product" method="POST" class="inline-form">
                        <input type="hidden" name="product_id" value="{{ product.id }}">
                        <button type="submit" class="delete-btn">Delete</button>
                    </form>

                    <a href="/vendor/add-discount/{{ product.id }}">Discount</a>

                </div>

            </div>

        </div>
        {% endfor %}

    </div>

</div>
