{% extends "base.html" %}

{% block title %}Product{% endblock %}

{% block content %}

<div class="item-page">

    <div class="item-image-section">
        <img src="{{ product.image_url if product.image_url else '/static/images/products/default.png' }}" class="item-image">
    </div>

    <div class="item-info-section">

        <h1>{{ product.title }}</h1>

        <p class="item-description">{{ product.description }}</p>

        <p class="item-price">Price: ${{ product.price }}</p>

        <p class="item-stock">
            {% if product.inventory > 0 %}
                In Stock ({{ product.inventory }})
            {% else %}
                Out of Stock
            {% endif %}
        </p>

        <form action="/add_to_cart" method="POST" class="add-to-cart-form">

            <select name="product_variant_id" required>

                {% for v in variants %}
                    <option value="{{ v.id }}">
                        {{ v.color }} / {{ v.size }} (Stock: {{ v.stock }})
                    </option>
                {% endfor %}

            </select>

            <div class="quantity-selector">
                <label>Quantity:</label>
                <input type="number" name="quantity" value="1" min="1">
            </div>

            <button type="submit">
                Add to Cart
            </button>

        </form>

    </div>

</div>

<style>
/* Start Item Page (mobile first) */

.item-page {
    display: flex;
    flex-direction: column;
    gap: 16px;
    padding: 12px;
}

/* Image */
.item-image-section {
    width: 100%;
    display: flex;
    justify-content: center;
}

.item-image {
    width: 100%;
    max-height: 300px;
    object-fit: contain;
}

/* Info */
.item-info-section {
    display: flex;
    flex-direction: column;
    gap: 10px;
}

.item-info-section h1 {
    font-size: 1.2rem;
    margin: 0;
}

.item-description {
    font-size: 0.9rem;
    color: #555;
}

.item-price {
    font-size: 1.2rem;
    font-weight: bold;
}

.item-stock {
    font-size: 0.9rem;
    color: #333;
}

/* Quantity */
.quantity-selector {
    display: flex;
    align-items: center;
    gap: 8px;
}

.quantity-selector input {
    width: 60px;
    padding: 6px;
    border: 1px solid #ccc;
    border-radius: 4px;
}

/* Button */
.add-to-cart-form {
    display: flex;
    flex-direction: column;
    gap: 10px;
}

.add-to-cart-btn {
    padding: 10px;
    border: none;
    background: var(--accent-color);
    color: white;
    font-size: 1rem;
    border-radius: 6px;
    cursor: pointer;
}

/* Desktop upgrade */
@media (min-width: 768px) {

    .item-page {
        flex-direction: row;
        max-width: 1000px;
        margin: 0 auto;
    }

    .item-image-section {
        flex: 1;
    }

    .item-info-section {
        flex: 1;
    }

}
</style>

{% endblock %}
